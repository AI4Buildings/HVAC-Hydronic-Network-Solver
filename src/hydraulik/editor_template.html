<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Hydraulikschema-Editor</title>
<style>
  :root { --bg:#f4f4f2; --panel:#ffffff; --line:#d8d7d2; --ink:#1c1c1a; --muted:#6b6a65;
          --vl:#c62828; --rl:#1565c0; --sel:#0b7a3e; }
  * { box-sizing:border-box; }
  body { margin:0; font:13px/1.45 system-ui,-apple-system,'Segoe UI',sans-serif;
         color:var(--ink); background:var(--bg); height:100vh; display:flex; flex-direction:column; }
  header { display:flex; align-items:center; gap:8px; padding:8px 12px;
           background:var(--panel); border-bottom:1px solid var(--line); }
  header h1 { font-size:15px; margin:0 12px 0 0; }
  button { font:inherit; padding:5px 10px; border:1px solid var(--line); border-radius:6px;
           background:#fff; cursor:pointer; }
  button:hover { background:#f0efe9; }
  button.primary { background:#1c1c1a; color:#fff; border-color:#1c1c1a; }
  main { flex:1; display:flex; min-height:0; }
  #palette { width:212px; overflow-y:auto; background:var(--panel);
             border-right:1px solid var(--line); padding:8px; }
  #palette h3 { font-size:11px; text-transform:uppercase; letter-spacing:.04em;
                color:var(--muted); margin:10px 4px 4px; }
  .pal-item { display:block; width:100%; text-align:left; margin:2px 0; padding:5px 8px; }
  .pal-item.active { outline:2px solid var(--sel); }
  .tpl-row { display:flex; align-items:center; gap:2px; }
  .tpl-row .pal-item { flex:1; }
  .tpl-del { border:none; background:none; color:var(--vl); font-size:14px;
             cursor:pointer; padding:2px 6px; }
  .tpl-io { border:none; background:none; cursor:pointer; font-size:12px;
            color:var(--muted); padding:0 3px; }
  #canvas-wrap { flex:1; overflow:auto; position:relative; }
  svg#cv { display:block; background:#fff; }
  #inspector { width:300px; overflow-y:auto; background:var(--panel);
               border-left:1px solid var(--line); padding:10px; }
  #inspector h3 { font-size:12px; margin:12px 0 6px; }
  .field { margin:6px 0; }
  .field label { display:block; font-size:11px; color:var(--muted); margin-bottom:2px; }
  .field input[type=text], .field input[type=number], .field select {
      width:100%; font:inherit; padding:4px 6px; border:1px solid var(--line); border-radius:5px; }
  .field .unitrow { display:flex; gap:4px; }
  .field .unitrow input { flex:1; }
  .field .unitrow select { width:118px; }
  .req { color:var(--vl); }
  #issues { font-size:12px; }
  #issues li { color:#8a5200; margin:2px 0; }
  #issues li.err { color:var(--vl); }
  #issues li[data-focus] { cursor:pointer; text-decoration:underline dotted; }
  .hint { font-size:11px; color:var(--muted); margin:4px 0; }
  dialog { width:640px; max-width:92vw; border:1px solid var(--line); border-radius:10px; }
  dialog textarea { width:100%; height:340px; font:12px/1.4 ui-monospace,monospace; }
  .comp-label { font:11px system-ui; fill:var(--ink); }
  .ts-badge { font:10px system-ui; fill:#7a4bd6; }
  .port { fill:#fff; stroke:#444; stroke-width:1.4; cursor:crosshair; }
  .port:hover, .port.pending { fill:#ffd54d; }
  .sym { stroke:#222; stroke-width:1.6; fill:#fff; }
  .tabs { display:flex; gap:4px; margin:10px 0 8px; }
  .tab { flex:1; padding:4px 6px; border:1px solid #ccc; border-radius:6px;
         background:#f6f5f0; cursor:pointer; font-size:12px; }
  .tab.active { background:#fff; border-color:#0b7a3e; color:#0b7a3e; font-weight:600; }
  .bems-box { border:1px solid #ddd; border-radius:6px; padding:6px 8px; margin-bottom:8px; }
  .bems-del { margin-top:2px; font-size:11px; }
  .wire { fill:none; stroke-width:3.2; pointer-events:none; }
  .wire.measure { stroke-width:1.4; stroke:#555; }   /* Messleitung eines Fühlers */
  .wire-hit { fill:none; stroke:transparent; stroke-width:14; cursor:pointer; }
  .wp { fill:#fff; stroke:#0b7a3e; stroke-width:1.6; cursor:move; }
  .wire.vl { stroke:var(--vl); }
  .wire.rl { stroke:var(--rl); }
  .wire.kvl { stroke:#34a853; }   /* Kälte-Vorlauf hellgrün */
  .wire.krl { stroke:#0d5c2c; }   /* Kälte-Rücklauf dunkelgrün */
  .wire.n  { stroke:#777; }
  .wire.selected { stroke-width:5; }
  g.comp { cursor:grab; }
  g.comp.selected .sym { stroke:var(--sel); stroke-width:2.4; }
</style>
</head>
<body>
<header>
  <h1>Hydraulikschema-Editor</h1>
  <button id="btn-new">Neu</button>
  <button id="btn-undo" title="Rückgängig (Strg+Z)">↶</button>
  <button id="btn-redo" title="Wiederholen (Strg+Shift+Z)">↷</button>
  <button id="btn-zoom-out" title="Herauszoomen (Strg+Mausrad)">−</button>
  <span class="hint" id="zoom-label" style="min-width:44px; text-align:center">100 %</span>
  <button id="btn-zoom-in" title="Hineinzoomen (Strg+Mausrad)">+</button>
  <button id="btn-zoom-reset" title="Zoom zurücksetzen">1:1</button>
  <button id="btn-import">YAML importieren</button>
  <button id="btn-export">YAML exportieren</button>
  <button id="btn-solve" class="primary">▶ Rechnen</button>
  <button id="btn-copy" title="Auswahl kopieren (Strg+C)">Kopieren</button>
  <button id="btn-paste" title="Einfügen (Strg+V)">Einfügen</button>
  <button id="btn-del">Auswahl löschen (Entf)</button>
  <span class="hint" id="status">Komponenten aus der Palette platzieren; Verbindungsleitungen
    von Port zu Port ziehen (Linie anklicken für Parameter/Farbe). ESC bricht ab.</span>
</header>
<div id="tip" style="display:none; position:fixed; z-index:50; background:#1c1c1a; color:#fff;
     font:12px/1.5 system-ui; padding:6px 9px; border-radius:6px; pointer-events:none;
     max-width:380px; white-space:pre;"></div>
<main>
  <nav id="palette"></nav>
  <div id="canvas-wrap"><svg id="cv" width="4000" height="2600"></svg></div>
  <aside id="inspector"></aside>
</main>
<dialog id="dlg">
  <h3 id="dlg-title" style="margin-top:0"></h3>
  <textarea id="dlg-text" spellcheck="false"></textarea>
  <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:8px;">
    <button id="dlg-file">Datei laden…</button>
    <input type="file" id="dlg-fileinput" accept=".yaml,.yml,.txt" style="display:none">
    <button id="dlg-save">Als Datei speichern</button>
    <button id="dlg-copy">In Zwischenablage</button>
    <button id="dlg-ok" class="primary">OK</button>
    <button id="dlg-close">Schließen</button>
  </div>
</dialog>

  m:"m", mm:"mm", cm:"cm", m2:"m²",
  W_m2K:"W/(m²·K)", W_mK:"W/(m·K)", W_K:"W/K",
  Pa_m3h2:"Pa/(m³/h)²", Pa_m3s2:"Pa/(m³/s)²",
  Pa_m3h:"Pa/(m³/h)", Pa_m3s:"Pa/(m³/s)",

  pressure:"Druck (Überdruck)", flow:"Volumenstrom", massflow:"Massenstrom",
  temperature:"Temperatur", power:"Leistung", length:"Länge", area:"Fläche",

  ua:"UA-Wert", quad_resistance:"Widerstand C", lin_resistance:"linearer Widerstand",

function unitLabel(sfx){ return UNIT_LABEL[sfx] || sfx; }

const deepClone = o => JSON.parse(JSON.stringify(o));

function templateFromSelection() {
  const comps = selectedComps();
  if (!comps.length) return null;
  const cx = snap(comps.reduce((a, c) => a + c.x, 0) / comps.length);
  const cy = snap(comps.reduce((a, c) => a + c.y, 0) / comps.length);
  const idx = new Map(comps.map((c, i) => [c.id, i]));
  return {
    comps: comps.map(c => ({type: c.type, name: c.name, ts: c.ts || "", rot: c.rot || 0,
                            dx: c.x - cx, dy: c.y - cy, params: deepClone(c.params || {}),
                            bems: c.bems ? deepClone(c.bems) : undefined})),
    wires: state.wires
      .filter(w => idx.has(w.a.comp) && idx.has(w.b.comp))
      .map(w => {
        const t = {a: [idx.get(w.a.comp), w.a.port], b: [idx.get(w.b.comp), w.b.port],
                   color: w.color || "n"};
        if (w.type === "conduit") { t.type = "conduit"; t.name = w.name;
          t.ts = w.ts || ""; t.params = deepClone(w.params || {}); }
        if (w.pts) t.pts = w.pts.map(pt => [pt.x - cx, pt.y - cy]);
        return t;
      }),
  };
}
function insertTemplate(tpl, x, y) {
  invalidate();
  const newIds = [], ids = new Set();
  for (const tc of tpl.comps) {
    const c = {id: idSeq++, type: tc.type,
               name: nameTaken(tc.name) ? uniqueName(tc.name) : tc.name,
               ts: tc.ts || "", rot: tc.rot || 0,
               x: snap(x + tc.dx), y: snap(y + tc.dy),
               params: deepClone(tc.params || {})};
    if (tc.bems && tc.bems.length) c.bems = deepClone(tc.bems);
    state.comps.push(c); newIds.push(c.id); ids.add(c.id);
  }
  for (const tw of tpl.wires) {
    const w = {a: {comp: newIds[tw.a[0]], port: tw.a[1]},
               b: {comp: newIds[tw.b[0]], port: tw.b[1]}, color: tw.color || "n"};
    if (tw.type === "conduit") {
      w.type = "conduit";
      const base = tw.name || "lt1";
      w.name = nameTaken(base) ? uniqueName(base) : base;
      w.ts = tw.ts || ""; w.params = deepClone(tw.params || {});

    if (tw.pts) w.pts = tw.pts.map(([dx, dy]) => ({x: snap(x + dx), y: snap(y + dy)}));

function wireEnds(w) {
  return [absPort(compById(w.a.comp), w.a.port), absPort(compById(w.b.comp), w.b.port)];
}
function wireD(w) {                 // Pfad: gerade / Auto-Winkel / über Knickpunkte
  const [a, b] = wireEnds(w);
  const pts = w.pts || [];
  if (!pts.length) {
    if (Math.abs(a.y - b.y) < 1 || Math.abs(a.x - b.x) < 1)
      return `M${a.x},${a.y} L${b.x},${b.y}`;
    const mx = (a.x + b.x) / 2;
    return `M${a.x},${a.y} L${mx},${a.y} L${mx},${b.y} L${b.x},${b.y}`;
  }
  return `M${a.x},${a.y} ` + pts.map(p => `L${p.x},${p.y}`).join(" ") + ` L${b.x},${b.y}`;
}
function insertWaypoint(w, pt) {    // in das nächstgelegene Segment einfügen
  const [a, b] = wireEnds(w);
  const seq = [a, ...(w.pts || []), b];
  let best = 0, bd = Infinity;
  for (let i = 0; i < seq.length - 1; i++) {
    const p = seq[i], q = seq[i + 1];
    const l2 = (q.x - p.x) ** 2 + (q.y - p.y) ** 2 || 1;
    const t = Math.max(0, Math.min(1, ((pt.x - p.x) * (q.x - p.x) + (pt.y - p.y) * (q.y - p.y)) / l2));
    const d = Math.hypot(pt.x - (p.x + t * (q.x - p.x)), pt.y - (p.y + t * (q.y - p.y)));
    if (d < bd) { bd = d; best = i; }
  }
  w.pts = w.pts || [];
  w.pts.splice(best, 0, {x: snap(pt.x), y: snap(pt.y)});
}

function isSelectedComp(c) {

function uniqueName(base) {

function pasteClipboard() {

let history = [], historyIndex = -1;

                                            wires: state.wires, idSeq}); }
function commit(){
  history = history.slice(0, historyIndex + 1);
  history.push(snapshot());
  if (history.length > 100) history.shift();
  historyIndex = history.length - 1;
}
function restoreSnap(s){
  const o = JSON.parse(s);
  state = {fluid: o.fluid, comps: o.comps, wires: o.wires};
  idSeq = o.idSeq;
  selection = null; pendingPort = null; wireDrag = null; boxSel = null; lastResult = null;
  render();
}
function undo(){ if (historyIndex > 0) { historyIndex--; restoreSnap(history[historyIndex]); } }
function redo(){ if (historyIndex < history.length - 1) { historyIndex++; restoreSnap(history[historyIndex]); } }

function portAt(x, y, exclude) {    // nächster Port im Fangradius
  let best = null, bd = 16;
  for (const c of state.comps) {
    for (const [pn, p] of Object.entries(portPos(c))) {
      if (exclude && exclude.comp === c.id && exclude.port === pn) continue;
      const d = Math.hypot(c.x + p.dx - x, c.y + p.dy - y);
      if (d < bd) { bd = d; best = {comp: c.id, port: pn, x: c.x + p.dx, y: c.y + p.dy}; }
    }
  }
  return best;
}

/* ---------- Ports & Geometrie ------------------------------------------- */
function portNames(comp) {
  const spec = TYPES[comp.type].ports;
  if (!spec.template) return spec.base.slice();
  const p = TYPES[comp.type].params.find(x => x.name === spec.count_param);
  let n = comp.params[spec.count_param];
  if (n === undefined || n === null || n === "") n = (p && p.default != null) ? p.default : 2;
  const out = spec.base.slice();
  for (let i = 1; i <= Number(n); i++) out.push(spec.template.replace("{}", i));
  return out;
}
function rotXY(dx, dy, rot) {
  switch (((rot || 0) % 360 + 360) % 360) {
    case 90:  return {dx: -dy, dy: dx};
    case 180: return {dx: -dx, dy: -dy};
    case 270: return {dx: dy,  dy: -dx};
    default:  return {dx, dy};
  }
}
function portPos(comp) {                       // → {portname:{dx,dy}} (inkl. Rotation)
  const raw = portPosRaw(comp), pos = {};
  for (const [k, p] of Object.entries(raw)) pos[k] = rotXY(p.dx, p.dy, comp.rot);
  return pos;
}
function portPosRaw(comp) {
  const t = comp.type, names = portNames(comp), pos = {};
  // Anschlusspunkte tangieren die Ventilsymbole außen (r=4.5 am Scheitel bei ±16)
  if (t === "mixing_valve_3way") return {a:{dx:-21,dy:0}, b:{dx:0,dy:21}, ab:{dx:21,dy:0}};
  if (t === "control_valve" || t === "balancing_valve" || t === "ball_valve")
    return {in:{dx:-21,dy:0}, out:{dx:21,dy:0}};
  if (t === "check_valve") return {in:{dx:-21,dy:0}, out:{dx:21,dy:0}};
  if (t === "temperature_sensor" || t === "pressure_sensor") return {port:{dx:-20,dy:0}};
  if (t === "pressure_diff_sensor") return {plus:{dx:-20,dy:0}, minus:{dx:20,dy:0}};
  if (t === "flow_sensor") return {in:{dx:-21,dy:0}, out:{dx:21,dy:0}};
  if (t === "energy_meter") return {in:{dx:-21,dy:0}, out:{dx:21,dy:0}, t_ref:{dx:0,dy:-21}};
  if (t === "tee") return {a:{dx:-22,dy:0}, b:{dx:22,dy:0}, c:{dx:0,dy:22}};
  if (t === "open_end") return {port:{dx:-20,dy:0}};
  if (t === "inflow") return {port:{dx:20,dy:0}};
  if (t === "outflow") return {port:{dx:-20,dy:0}};
  if (t === "cap") return {port:{dx:-14,dy:0}};
  if (t === "hydraulic_separator")
    return {prim_in:{dx:-20,dy:-22}, sec_out:{dx:20,dy:-22},
            sec_in:{dx:20,dy:22}, prim_out:{dx:-20,dy:22}};
  if (t === "manifold") {
    pos.main = {dx:-compWidth(comp)/2, dy:0};
    const subs = names.filter(n => n !== "main");
    subs.forEach((n,i) => pos[n] = {dx:-compWidth(comp)/2 + 34 + i*30, dy:-14});
    return pos;
  }
  if (t === "buffer_storage") {
    const subs = names, h = Math.max(50, subs.length*18 + 12);
    subs.forEach((n,i) => pos[n] = {dx:-20, dy:-h/2 + 12 + i*18});
    return pos;
  }

}

  if (comp.type === "manifold") return Math.max(96, 40 + portNames(comp).length*30);
  return 60;
}
function absPort(comp, port) {
  const p = portPos(comp)[port];
  return p ? {x: comp.x + p.dx, y: comp.y + p.dy} : {x:comp.x, y:comp.y};
}

    case "energy_meter":
      return `<rect class="sym" x="-16" y="-10" width="32" height="20"/>
              <line class="sym" x1="-21" y1="0" x2="-16" y2="0"/>
              <line class="sym" x1="16" y1="0" x2="21" y2="0"/>
              <line class="sym" x1="0" y1="-10" x2="0" y2="-21"/>
              <text x="0" y="4" text-anchor="middle" class="comp-label" font-size="9">WMZ</text>`;
    case "flow_resistance":
      return `<rect class="sym" x="-18" y="-8" width="36" height="16"/>
              <line class="sym" x1="-18" y1="8" x2="18" y2="-8"/>`;
    case "pipe":
      return `<line class="sym" x1="-26" y1="0" x2="26" y2="0" stroke-width="4"/>
              <line class="sym" x1="-14" y1="-6" x2="-14" y2="6"/><line class="sym" x1="14" y1="-6" x2="14" y2="6"/>`;
    case "link":
      return `<line class="sym" x1="-20" y1="0" x2="20" y2="0" stroke-dasharray="4 3"/>`;
    case "radiator":
      return `<rect class="sym" x="-20" y="-13" width="40" height="26"/>
              <line class="sym" x1="-10" y1="-13" x2="-10" y2="13"/>
              <line class="sym" x1="0" y1="-13" x2="0" y2="13"/>
              <line class="sym" x1="10" y1="-13" x2="10" y2="13"/>`;
    case "floor_heating":
      return `<rect class="sym" x="-22" y="-14" width="44" height="28"/>
              <polyline class="sym" points="-16,8 -16,-8 -8,-8 -8,8 0,8 0,-8 8,-8 8,8 16,8 16,-8" fill="none"/>`;
    case "heating_coil": case "cooling_coil":
      return `<rect class="sym" x="-16" y="-16" width="32" height="32"/>
              <line class="sym" x1="-16" y1="16" x2="16" y2="-16"/>
              <text x="0" y="28" text-anchor="middle" class="comp-label">${t==="heating_coil"?"HR":"KR"}</text>`;
    case "hydraulic_separator":
      return `<rect class="sym" x="-13" y="-28" width="26" height="56" rx="6"/>`;
    case "manifold": {
      const w = compWidth(comp);
      return `<rect class="sym" x="${-w/2}" y="-7" width="${w}" height="14"/>`;
    }
    case "tee":
      return `<line class="sym" x1="-22" y1="0" x2="22" y2="0" stroke-width="3"/>
              <line class="sym" x1="0" y1="0" x2="0" y2="22" stroke-width="3"/>
              <circle class="sym" r="4.5" fill="#222"/>`;
    case "open_end":
      return `<line class="sym" x1="-20" y1="0" x2="4" y2="0"/>
              <polygon class="sym" points="4,-8 4,8 16,0"/>`;
    case "cap":
      return `<line class="sym" x1="-14" y1="0" x2="4" y2="0"/>
              <line class="sym" x1="4" y1="-9" x2="4" y2="9" stroke-width="3.5"/>
              <line class="sym" x1="9" y1="-6" x2="9" y2="6" stroke-width="2"/>`;
    default:
      return `<rect class="sym" x="-22" y="-14" width="44" height="28" rx="4"/>`;
  }
}

function uprightText(svgStr, rot) {
  // Beschriftungen in Symbolen (T, p, Δp, V̇, WMZ, ϑ, WP, …) gegenrotieren,
  // damit sie bei 90°/180°/270° lesbar bleiben (Drehpunkt ≈ optische Mitte).
  if (!rot) return svgStr;
  return svgStr.replace(/<text\s([^>]*?)>/g, (m, attrs) => {
    const x = Number((/(?:^|\s)x="([-\d.]+)"/.exec(attrs) || [0, 0])[1]);
    const y = Number((/(?:^|\s)y="([-\d.]+)"/.exec(attrs) || [0, 0])[1]);
    return `<text ${attrs} transform="rotate(${-rot} ${x} ${y - 4})">`;
  });
}

/* ---------- Rendering ---------------------------------------------------- */
const svg = document.getElementById("cv");
const BASE_W = 4000, BASE_H = 2600;
let zoom = 1.0;
function setZoom(z, ev) {
  z = Math.min(3.0, Math.max(0.25, z));
  const wrap = document.getElementById("canvas-wrap");
  const rect = wrap.getBoundingClientRect();
  const cx = ev ? ev.clientX - rect.left : wrap.clientWidth / 2;
  const cy = ev ? ev.clientY - rect.top : wrap.clientHeight / 2;
  const mx = (wrap.scrollLeft + cx) / zoom;      // Modellpunkt unter dem Cursor
  const my = (wrap.scrollTop + cy) / zoom;
  zoom = z;
  render();
  wrap.scrollLeft = mx * zoom - cx;              // Punkt unter dem Cursor halten
  wrap.scrollTop = my * zoom - cy;
  document.getElementById("zoom-label").textContent = Math.round(zoom * 100) + " %";
}
function render() {
  svg.setAttribute("width", BASE_W * zoom);
  svg.setAttribute("height", BASE_H * zoom);
  let out = `<defs><pattern id="grid" width="16" height="16" patternUnits="userSpaceOnUse">
    <path d="M16 0H0V16" fill="none" stroke="#eee" stroke-width="1"/></pattern></defs>
    <rect width="${BASE_W}" height="${BASE_H}" fill="url(#grid)"/>`;
  for (const w of state.wires) {
    const i = state.wires.indexOf(w);
    const sel = (selection && selection.kind==="wire" && selection.ref===w) ? " selected" : "";
    const d = wireD(w);
    const meas = (isTapPort(w.a.comp, w.a.port) || isTapPort(w.b.comp, w.b.port))
      ? " measure" : "";
    out += `<path class="wire ${w.color}${sel}${meas}" d="${d}"/>`;
    out += `<path class="wire-hit" data-wire="${i}" d="${d}"/>`;
    if (sel && w.pts)                              // Knickpunkt-Griffe der Auswahl
      w.pts.forEach((p, k) => {
        out += `<rect class="wp" data-wire="${i}" data-wp="${k}"
                x="${p.x - 4}" y="${p.y - 4}" width="8" height="8"/>`;
      });
    if (sel && w.name) {                           // Name nur bei Selektion
      const [pa, pb] = wireEnds(w);
      const mid = w.pts && w.pts.length ? w.pts[Math.floor((w.pts.length - 1) / 2)]
                                        : {x: (pa.x + pb.x) / 2, y: (pa.y + pb.y) / 2};
      out += `<text class="comp-label" x="${mid.x}" y="${mid.y - 8}"
              text-anchor="middle" fill="#0b7a3e">${esc(w.name)}</text>`;
    }
  }
  if (wireDrag && wireDrag.moved) {                  // Gummiband beim Ziehen
    const a = absPort(compById(wireDrag.from.comp), wireDrag.from.port);
    const tx = wireDrag.hover ? wireDrag.hover.x : wireDrag.mx;
    const ty = wireDrag.hover ? wireDrag.hover.y : wireDrag.my;
    out += `<line x1="${a.x}" y1="${a.y}" x2="${tx}" y2="${ty}"
            stroke="#0b7a3e" stroke-width="2.5" stroke-dasharray="6 4"/>`;
  }
  if (boxSel && boxSel.active) {
    const x = Math.min(boxSel.x0, boxSel.x1), y = Math.min(boxSel.y0, boxSel.y1);
    out += `<rect x="${x}" y="${y}" width="${Math.abs(boxSel.x1-boxSel.x0)}"
            height="${Math.abs(boxSel.y1-boxSel.y0)}" fill="rgba(11,122,62,0.07)"
            stroke="#0b7a3e" stroke-dasharray="5 4"/>`;
  }
  for (const c of state.comps) {
    const sel = isSelectedComp(c) ? " selected" : "";
    out += `<g class="comp${sel}" data-comp="${c.id}" transform="translate(${c.x},${c.y})">`;
    // unsichtbare Trefferfläche (Symbole mit Lücken bleiben klick-/hoverbar)
    const hw = Math.max(compWidth(c) / 2 + 6, 32);
    out += `<rect x="${-hw}" y="-32" width="${2 * hw}" height="64" fill="transparent"/>`;
    out += `<g transform="rotate(${c.rot || 0})">` + uprightText(symbol(c), c.rot || 0) + `</g>`;
    out += `<text class="comp-label" x="0" y="44" text-anchor="middle">${esc(c.name)}</text>`;
    const rr = resultRows(c.name);
    if (rr.length) {
      const r0 = rr[0];
      out += `<text class="comp-label" x="0" y="57" text-anchor="middle" fill="#0b7a3e">` +
             `${fmt(r0.q_m3h)} m³/h · ${fmt(r0.t_in_C,1)}→${fmt(r0.t_out_C,1)} °C</text>`;
    }
    if (c.ts) out += `<text class="ts-badge" x="26" y="-26">TS ${esc(c.ts)}</text>`;
    const pp = portPos(c);
    for (const [pn, p] of Object.entries(pp)) {
      const pend = ((pendingPort && pendingPort.comp===c.id && pendingPort.port===pn) ||
                    (wireDrag && wireDrag.hover && wireDrag.hover.comp===c.id &&
                     wireDrag.hover.port===pn)) ? " pending" : "";
      out += `<circle class="port${pend}" data-comp="${c.id}" data-port="${pn}"
              cx="${p.dx}" cy="${p.dy}" r="4.5"><title>${esc(c.name)}.${pn}</title></circle>`;
    }
    out += `</g>`;
  }
  svg.innerHTML = `<g transform="scale(${zoom})">` + out + `</g>`;
  renderInspector();
  autosave();
}
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;"); }
function compById(id){ return state.comps.find(c => c.id === id); }
function fmt(v, d){ return (v === undefined || v === null || isNaN(v)) ? "–"
  : Number(v).toFixed(d === undefined ? 3 : d).replace(/\.?0+$/, m => m.includes(".") ? "" : m); }
function resultRows(name){
  if (!lastResult) return [];
  return lastResult.components.filter(r => r.name === name || r.name.startsWith(name + ":"));
}

/* ---------- Rechnen (POST /solve, nur unter 'hydraulik serve') ------------ */
async function solveNow() {
  const bad = validate().filter(i => i.err);
  if (bad.length && !confirm(`Es gibt ${bad.length} Fehler (siehe Prüfungen). Trotzdem rechnen?`)) return;
  setStatus("Rechne …");
  let data;
  try {
    const resp = await fetch("solve", {method: "POST", body: exportYAML(),
                                       headers: {"Content-Type": "text/yaml"}});
    data = await resp.json();
  } catch (e) {
    lastResult = null;
    alert("Kein Rechen-Endpunkt erreichbar.\n\nDen Editor bitte über 'hydraulik serve' starten " +
          "(dann läuft der Solver lokal mit), statt die HTML-Datei direkt zu öffnen.");
    setStatus(""); render(); return;
  }
  if (!data.ok) {
    lastResult = null;
    document.getElementById("dlg-title").textContent = "Solver meldet Fehler";
    dlgText.value = data.error;
    document.getElementById("dlg-ok").style.display = "none";
    document.getElementById("dlg-save").style.display = "none";
    document.getElementById("dlg-file").style.display = "none";
    dlg.showModal();
    setStatus("Nicht gerechnet – Fehler siehe Dialog."); render(); return;
  }
  lastResult = data;
  const extra = (data.notices || []).length ? `  (${data.notices.length} Hinweis(e))` : "";
  setStatus(`Ergebnis: ${data.converged ? "konvergiert ✓" : "NICHT konvergiert!"} – ` +
            `Energiebilanz ${fmt(data.residuals.energy_imbalance_W, 2)} W${extra}. ` +
            `Werte per Mouse-Over an Komponenten und Leitungen.`);
  render();
}
document.getElementById("btn-solve").onclick = solveNow;

/* ---------- Ergebnis-Tooltips --------------------------------------------- */
const tip = document.getElementById("tip");
function fmtSensor(s) {
  const u = {t_C:["ϑ","°C"], p_kPa:["p","kPa (ü)"], dp_kPa:["Δp","kPa"],
             q_m3h:["V̇","m³/h"], m_dot_kg_s:["ṁ","kg/s"],
             t_leitung_C:["ϑ_Leitung","°C"], t_ref_C:["ϑ_Fühler","°C"], q_dot_kW:["Q̇","kW"]};
  let out = `${s.name}:  ` + Object.entries(s.readings).map(([k, v]) => {
    const [sym, unit] = u[k] || [k, ""];
    return `${sym} = ${fmt(v, 2)} ${unit}`;
  }).join("   ");
  const ids = (s.bems || []).map(e => [e.key, e.id].filter(Boolean).join("  ·  "))
                            .filter(Boolean);
  if (ids.length) out += `\n   BEMS: ${ids.join("\n         ")}`;
  if (s.description) out += `\n   ${s.description}`;
  return out;
}
function tooltipText(target) {
  if (!lastResult) return null;
  const compEl = target.closest("g.comp");
  if (compEl) {
    const c = compById(Number(compEl.dataset.comp));
    const sens = (lastResult.sensors || []).find(s => s.name === c.name);
    if (sens) return fmtSensor(sens);          // Sensoren: Messwerte + BEMS-Zuordnung
    const rows = resultRows(c.name);
    if (!rows.length) return null;
    return rows.map(r => {
      let s = `${r.name}:  V̇ = ${fmt(r.q_m3h)} m³/h   Δp = ${fmt(r.dp_kPa)} kPa\n` +
              `   T ${fmt(r.t_in_C, 2)} → ${fmt(r.t_out_C, 2)} °C`;
      if (Math.abs(r.q_dot_kW) > 1e-4) s += `   Q̇ = ${fmt(r.q_dot_kW)} kW`;
      if (r.extras && r.extras.v_m_s !== undefined) s += `   v = ${fmt(r.extras.v_m_s, 2)} m/s`;
      return s;
    }).join("\n");
  }
  const wireEl = target.closest(".wire-hit, .port");
  if (wireEl) {
    let ref;
    if (wireEl.classList.contains("port")) {
      const c = compById(Number(wireEl.dataset.comp));
      ref = `${c.name}.${wireEl.dataset.port}`;
    } else {
      const w = state.wires[Number(wireEl.dataset.wire)];
      if (w.type === "conduit") {                    // eigene Ergebnisse der Leitung
        const rows = resultRows(w.name);
        if (rows.length) {
          const r = rows[0];
          let s = `${w.name}:  V̇ = ${fmt(r.q_m3h)} m³/h   Δp = ${fmt(r.dp_kPa)} kPa\n` +
                  `   T ${fmt(r.t_in_C, 2)} → ${fmt(r.t_out_C, 2)} °C`;
          if (Math.abs(r.q_dot_kW) > 1e-4) s += `   Q̇ = ${fmt(r.q_dot_kW)} kW`;
          if (r.extras && r.extras.v_m_s !== undefined) s += `   v = ${fmt(r.extras.v_m_s, 2)} m/s`;
          return s;
        }
      }
      ref = portRef(w.a);
    }
    const idx = lastResult.port_map[ref];
    if (idx === undefined) return null;
    const nd = lastResult.nodes[idx];
    return `Knoten (${ref}):  p = ${fmt(nd.p_kPa, 2)} kPa (ü)   T = ${fmt(nd.t_C, 2)} °C`;
  }
  return null;
}

/* ---------- Palette ------------------------------------------------------ */
// 'open_end' ist durch inflow/outflow abgedeckt; 'conduit' wird nicht als
// Kasten platziert, sondern entsteht beim Ziehen jeder Leitung (Linie).
const PALETTE_HIDDEN = new Set(["open_end", "conduit", "link"]);
let paletteTab = "comps";           // Palette-Register: "comps" | "tpl"
function buildPalette(){
  let html = `<div class="tabs">
    <button class="tab${paletteTab==="comps"?" active":""}" data-ptab="comps">Komponenten</button>
    <button class="tab${paletteTab==="tpl"?" active":""}" data-ptab="tpl">Vorlagen</button>
  </div>`;
  if (paletteTab === "comps") {
    const groups = {};
    for (const t of CATALOG.types) {
      if (PALETTE_HIDDEN.has(t.type)) continue;
      const m = META[t.type] || {de:t.type, grp:"Sonstige", pre:"k"};
      (groups[m.grp] = groups[m.grp] || []).push({type:t.type, label:m.de, doc:t.doc});
    }
    for (const g of GRP_ORDER) {
      if (!groups[g]) continue;
      groups[g].sort((a, b) => a.label.localeCompare(b.label, "de"));
      html += `<h3>${g}</h3>`;
      for (const it of groups[g])
        html += `<button class="pal-item" data-type="${it.type}" title="${esc(it.doc)}">${esc(it.label)}</button>`;
    }
  } else {
    html += `<h3>Vorlagen
      <button class="tpl-io" id="tpl-export" title="Eigene Vorlagen als JSON-Datei sichern">⤓</button>
      <button class="tpl-io" id="tpl-import" title="Vorlagen aus JSON-Datei laden">⤒</button></h3>`;
    const names = [...Object.keys(BUILTIN_TEMPLATES), ...Object.keys(userTemplates).sort()];
    for (const n of names) {
      const own = !!userTemplates[n];
      html += `<div class="tpl-row">
        <button class="pal-item" data-tpl="${esc(n)}"
          title="Einfügen: anklicken, dann auf die Zeichenfläche klicken">${esc(n)}</button>` +
        (own ? `<button class="tpl-del" data-del="${esc(n)}" title="Vorlage löschen">×</button>` : "") +
        `</div>`;
    }
    html += `<div class="hint" style="margin:4px">Eigene Vorlage: Bereich auswählen →
      Inspector „Als Vorlage speichern".</div>
      <input type="file" id="tpl-fileinput" accept=".json" style="display:none">`;
  }
  document.getElementById("palette").innerHTML = html;
}
buildPalette();
document.getElementById("palette").addEventListener("click", ev => {
  const pt = ev.target.closest("[data-ptab]");
  if (pt) {
    paletteTab = pt.dataset.ptab;
    placing = null; placingTemplate = null; setStatus("");
    buildPalette(); return;
  }
  const del = ev.target.closest(".tpl-del");
  if (del) {
    if (confirm(`Vorlage '${del.dataset.del}' löschen?`)) {
      delete userTemplates[del.dataset.del];
      persistTemplates(); buildPalette();
    }
    return;
  }
  if (ev.target.closest("#tpl-export")) {
    const blob = new Blob([JSON.stringify(userTemplates, null, 1)], {type: "application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = "hydraulik_vorlagen.json"; a.click();
    URL.revokeObjectURL(a.href); return;
  }
  if (ev.target.closest("#tpl-import")) {
    document.getElementById("tpl-fileinput").click(); return;
  }
  const b = ev.target.closest(".pal-item");
  if (!b) return;
  if (b.dataset.tpl !== undefined) {                 // Vorlagen-Platzierungsmodus
    placingTemplate = (placingTemplate === b.dataset.tpl) ? null : b.dataset.tpl;
    placing = null;
    document.querySelectorAll(".pal-item").forEach(x =>
      x.classList.toggle("active", x.dataset.tpl === placingTemplate));
    setStatus(placingTemplate
      ? `Vorlage '${placingTemplate}': auf die Zeichenfläche klicken zum Einfügen (ESC bricht ab)`
      : "");
    return;
  }
  placing = (placing === b.dataset.type) ? null : b.dataset.type;
  placingTemplate = null;
  document.querySelectorAll(".pal-item").forEach(x =>
    x.classList.toggle("active", x.dataset.type === placing));
  setStatus(placing ? `Platzieren: auf die Zeichenfläche klicken (${META[placing]?.de || placing})` : "");
});
document.getElementById("palette").addEventListener("change", ev => {
  if (ev.target.id !== "tpl-fileinput") return;
  const f = ev.target.files[0];
  if (!f) return;
  f.text().then(t => {
    try {
      const data = JSON.parse(t);
      let n = 0;
      for (const [name, tpl] of Object.entries(data))
        if (tpl && Array.isArray(tpl.comps)) { userTemplates[name] = tpl; n++; }
      persistTemplates(); buildPalette();
      setStatus(`${n} Vorlage(n) importiert.`);
    } catch (e) { alert("Vorlagen-Import fehlgeschlagen: " + e); }
  });
  ev.target.value = "";
});
function setStatus(msg){ document.getElementById("status").textContent = msg ||
  "Ports anklicken, um Leitungen zu ziehen. ESC bricht ab."; }

/* ---------- Komponenten anlegen ------------------------------------------ */
function nameTaken(name, self) {
  return state.comps.some(c => c !== self && c.name === name) ||
         state.wires.some(w => w !== self && w.name === name);
}
function freshName(type) {
  const pre = (META[type] || {pre:"k"}).pre;
  let i = 1;
  while (nameTaken(pre + i)) i++;
  return pre + i;
}
function addComp(type, x, y) {
  const c = {id: idSeq++, type, name: freshName(type), ts: "", x: snap(x), y: snap(y),
             rot: 0, params: {}};
  invalidate();
  state.comps.push(c);
  selection = {kind:"comp", ref:c};
  commit();
  render();
  return c;
}
const snap = v => Math.round(v / 8) * 8;

/* ---------- Canvas-Interaktion ------------------------------------------- */
function isTapPort(compId, port) {
  const c = compById(compId);
  if (!c) return false;
  return c.type === "temperature_sensor" || c.type === "pressure_sensor" ||
         c.type === "pressure_diff_sensor" || (c.type === "energy_meter" && port === "t_ref");
}
function addWire(a, b) {
  if (a.comp === b.comp && a.port === b.port) return;
  invalidate();
  if (isTapPort(a.comp, a.port) || isTapPort(b.comp, b.port)) {
    // Messleitung eines Fühlers: reine Verbindung (Knotenverschmelzung mit
    // der Messstelle), KEINE Verbindungsleitung – der Fühler liest den
    // Zustand des angezapften Knotens, ohne die Hydraulik zu beeinflussen.
    state.wires.push({a: {comp: a.comp, port: a.port}, b: {comp: b.comp, port: b.port},
                      color: "n"});
  } else {
    // Jede andere gezeichnete Linie ist eine Verbindungsleitung (Default: ideal)
    state.wires.push({type: "conduit", name: freshName("conduit"), ts: "", params: {},
                      a: {comp: a.comp, port: a.port}, b: {comp: b.comp, port: b.port},
                      color: "n"});
  }
  commit();
}
svg.addEventListener("mousedown", ev => {
  const pt = svgPoint(ev);
  const portEl = ev.target.closest(".port");
  if (portEl) {
    // Ziehen ODER Klick-Klick – entschieden wird beim mouseup
    wireDrag = {from: {comp: Number(portEl.dataset.comp), port: portEl.dataset.port},
                sx: pt.x, sy: pt.y, mx: pt.x, my: pt.y, moved: false, hover: null};
    ev.preventDefault(); ev.stopPropagation(); return;
  }
  // Doppelklick-Erkennung selbst (das Re-Rendering nach dem ersten Klick
  // ersetzt die SVG-Elemente – das native dblclick geht dabei verloren)
  const wpEl = ev.target.closest(".wp");
  if (wpEl) {
    const key = wpEl.dataset.wire + "/" + wpEl.dataset.wp;
    if (dblTrack.key === "wp:" + key && ev.timeStamp - dblTrack.t < 450) {   // Knick entfernen
      const w = state.wires[Number(wpEl.dataset.wire)];
      w.pts.splice(Number(wpEl.dataset.wp), 1);
      if (!w.pts.length) delete w.pts;
      dblTrack = {key: "", t: 0};
      commit(); render(); return;
    }

  if (wireEl) {
    const idx = Number(wireEl.dataset.wire);
    const w = state.wires[idx];
    if (dblTrack.key === "wire:" + idx && ev.timeStamp - dblTrack.t < 450) { // Knick einfügen
      insertWaypoint(w, pt);
      selection = {kind: "wire", ref: w};
      dblTrack = {key: "", t: 0};
      commit(); render(); return;
    }
    dblTrack = {key: "wire:" + idx, t: ev.timeStamp};
    selection = {kind: "wire", ref: w};
    render(); return;
  }
  dblTrack = {key: "", t: 0};
  const compEl = ev.target.closest("g.comp");

    const c = compById(Number(compEl.dataset.comp));

                : new Set(selection && selection.kind === "comp" ? [selection.ref.id] : []);
      ids.has(c.id) ? ids.delete(c.id) : ids.add(c.id);
      selection = ids.size ? {kind: "multi", ids} : null;
      render(); return;
    }
    if (!isSelectedComp(c)) selection = {kind: "comp", ref: c};
    // Knickpunkte interner Leitungen wandern mit der Gruppe mit
    const selIds = new Set(selectedComps().map(sc => sc.id));
    const wpts = [];
    for (const w of state.wires)
      if (w.pts && selIds.has(w.a.comp) && selIds.has(w.b.comp))
        for (const p of w.pts) wpts.push({p, ox: pt.x - p.x, oy: pt.y - p.y});

            wpts, moved: false};
    render(); return;
  }
  if (placingTemplate) {
    const tpl = getTemplate(placingTemplate);
    if (tpl) insertTemplate(deepClone(tpl), pt.x, pt.y);
    return;
  }
  if (placing) { addComp(placing, pt.x, pt.y); return; }

svg.addEventListener("mousemove", ev => {
  const pt = svgPoint(ev);
  if (wpDrag) {
    const p = wpDrag.w.pts[wpDrag.idx];
    p.x = snap(pt.x); p.y = snap(pt.y);
    wpDrag.moved = true;
    render(); return;
  }
  if (wireDrag) {
    if (Math.hypot(pt.x - wireDrag.sx, pt.y - wireDrag.sy) > 5) wireDrag.moved = true;
    wireDrag.mx = pt.x; wireDrag.my = pt.y;
    wireDrag.hover = portAt(pt.x, pt.y, wireDrag.from);
    if (wireDrag.moved) render();
    return;
  }
  if (boxSel) {
    boxSel.x1 = pt.x; boxSel.y1 = pt.y;
    if (Math.hypot(pt.x - boxSel.x0, pt.y - boxSel.y0) > 5) boxSel.active = true;
    if (boxSel.active) render();
    return;
  }
  if (!drag) return;
  for (const it of drag.items) { it.c.x = snap(pt.x - it.ox); it.c.y = snap(pt.y - it.oy); }
  for (const it of drag.wpts) { it.p.x = snap(pt.x - it.ox); it.p.y = snap(pt.y - it.oy); }
  drag.moved = true;
  render();
});

    const bs = boxSel; boxSel = null;
    if (bs.active) {                              // Rechteck: alle Komponenten darin
      const x0 = Math.min(bs.x0, bs.x1), x1 = Math.max(bs.x0, bs.x1);
      const y0 = Math.min(bs.y0, bs.y1), y1 = Math.max(bs.y0, bs.y1);
      const ids = new Set(state.comps
        .filter(c => c.x >= x0 && c.x <= x1 && c.y >= y0 && c.y <= y1)
        .map(c => c.id));

    render();

  if (wd.moved) {                                    // gezogen: auf Zielport einrasten
    if (wd.hover) addWire(wd.from, wd.hover);

  } else if (pendingPort) {                          // zweiter Klick
    if (!(pendingPort.comp === wd.from.comp && pendingPort.port === wd.from.port))
      addWire(pendingPort, wd.from);

  } else {                                           // erster Klick
    pendingPort = {...wd.from};

});
window.addEventListener("keydown", ev => {

                 (ev.target instanceof HTMLTextAreaElement) ||
                 (ev.target instanceof HTMLSelectElement);
  if ((ev.key === "Delete" || ev.key === "Backspace") && !inForm) {
    deleteSelection(); ev.preventDefault();
  }
  if ((ev.key === "r" || ev.key === "R") && !inForm) rotateSelection();
  if ((ev.metaKey || ev.ctrlKey) && !inForm && ev.key.toLowerCase() === "z") {
    ev.shiftKey ? redo() : undo(); ev.preventDefault();
  }
  if ((ev.metaKey || ev.ctrlKey) && !inForm && ev.key.toLowerCase() === "y") {
    redo(); ev.preventDefault();
  }
  if ((ev.metaKey || ev.ctrlKey) && !inForm && ev.key.toLowerCase() === "c" &&
      selection && selection.kind !== "wire") { copySelection(); ev.preventDefault(); }
  if ((ev.metaKey || ev.ctrlKey) && !inForm && ev.key.toLowerCase() === "v") {
    pasteClipboard(); ev.preventDefault();
  }
  if ((ev.metaKey || ev.ctrlKey) && !inForm && ev.key.toLowerCase() === "d") {
    copySelection(); pasteClipboard(); ev.preventDefault();
  }
});

function deleteSelection() {
  if (!selection) return;
  invalidate();
  if (selection.kind === "wire") {
    state.wires = state.wires.filter(w => w !== selection.ref);
  } else {
    const ids = new Set(selectedComps().map(c => c.id));
    state.wires = state.wires.filter(w => !ids.has(w.a.comp) && !ids.has(w.b.comp));
    state.comps = state.comps.filter(c => !ids.has(c.id));

}

function renderInspector() {
  const el = document.getElementById("inspector");
  // Läuft gerade eine Eingabe (Fokus in einem Formularfeld des Inspectors),
  // wird das Formular NICHT neu aufgebaut – sonst verschluckt der DOM-Tausch
  // Folgeklicks auf die Spinner-Pfeile der Zahlenfelder. Nur die Prüfliste
  // wird aktualisiert; der nächste Render (Klick in die Zeichnung, Auswahl-
  // wechsel, …) baut das Formular regulär neu.
  const ae = document.activeElement;
  if (!inspectorForce &&
      (inspectorHold ||
       (el.contains(ae) && (ae instanceof HTMLInputElement || ae instanceof HTMLSelectElement)
        && ae.dataset.kind !== "suffix" && ae.dataset.kind !== "choice"
        && ae.dataset.mgroup === undefined))) {
    refreshIssues();
    return;
  }
  let html = fluidForm();
  if (selection && selection.kind === "comp") html += compForm(selection.ref);
  else if (selection && selection.kind === "wire") html += wireForm(selection.ref);
  else if (selection && selection.kind === "multi")
    html += `<h3>Auswahl</h3><div class="hint">${selection.ids.size} Komponenten ausgewählt.<br>
      Ziehen verschiebt gemeinsam · Strg+C kopiert (inkl. interner Leitungen) ·
      Strg+V fügt ein · Strg+D dupliziert · Entf löscht · Shift+Klick ergänzt/entfernt.</div>
      <div class="field"><button id="btn-save-tpl">Auswahl als Vorlage speichern…</button></div>`;
  html += `<h3>Prüfungen <span class="hint">(gesamte Zeichnung – klicken wählt aus)</span></h3>` +
          `<ul id="issues"></ul>`;
  el.innerHTML = html;
  refreshIssues();
  bindInspector();
}
function refreshIssues() {
  const ul = document.getElementById("issues");

    (i.comp !== undefined ? ` data-focus="${i.comp}"` : "") +
    `>${esc(i.msg)}</li>`).join("");
  ul.querySelectorAll("li[data-focus]").forEach(li => {
    li.onclick = () => {
      const c = compById(Number(li.dataset.focus));
      if (c) {
        selection = {kind: "comp", ref: c};

        render();

  });
}

  };

    invalidate(); c.name = v; commit(); holdRender();

  if (tsInp) tsInp.onchange = ev => { invalidate(); c.ts = ev.target.value.trim(); commit(); holdRender(); };
  const rotBtn = el.querySelector("#c-rot");
  if (rotBtn) rotBtn.onclick = rotateSelection;
  el.querySelectorAll("[data-param]").forEach(inp => {
    inp.onchange = () => {
      // nachlaufende change-Events ersetzter/gerade ausgetauschter Felder

      if (!inp.isConnected || inspectorForce) return;
      invalidate();
      const kind = inp.dataset.kind, pname = inp.dataset.param;
      if (kind === "choice") { setOrDelete(c.params, pname, inp.value || undefined); }
      else if (kind === "bool") { c.params[pname] = inp.checked; }
      else if (kind === "str") { setOrDelete(c.params, pname, inp.value.trim() || undefined); }
      else if (kind === "num") { setOrDelete(c.params, pname, inp.value === "" ? undefined : Number(inp.value)); }
      else if (kind === "unit") { setOrDelete(c.params, inp.dataset.key, inp.value === "" ? undefined : Number(inp.value)); }
      else if (kind === "suffix") {

/* ---------- Validierung --------------------------------------------------- */
function validate() {
  const issues = [];
  for (const c of state.comps) {
    const t = TYPES[c.type];
    for (const p of t.params) {
      if (!p.required) continue;
      const has = p.choices || p.group==="bool" || p.group==="int" || p.group==="none"
        ? c.params[p.name] !== undefined && c.params[p.name] !== ""
        : p.keys.some(k => c.params[k] !== undefined);
      if (!has) issues.push({err:true, comp:c.id, msg:`${c.name}: Pflichtparameter '${p.name}' fehlt`});
    }
    // Bereichsprüfung (minv/maxv sind SI-Werte; Eingabe über Suffixfaktor umrechnen)
    for (const p of t.params) {
      if (p.minv == null && p.maxv == null) continue;
      let si = null;
      if (p.group === "int" || p.group === "none") si = c.params[p.name];
      else if (!p.choices && p.group !== "bool") {
        const k = p.keys.find(k => c.params[k] !== undefined);
        if (k !== undefined)
          si = c.params[k] * CATALOG.units[p.group][k.slice(p.name.length + 1)];
      }
      if (si == null || si === "") continue;
      if (p.minv != null && si < p.minv)
        issues.push({err:true, comp:c.id,
          msg:`${c.name}: '${p.name}' unter Minimum (${limitLabel(p, p.minv)})`});
      if (p.maxv != null && si > p.maxv)
        issues.push({err:true, comp:c.id,
          msg:`${c.name}: '${p.name}' über Maximum (${limitLabel(p, p.maxv)}) – z.B. Ventilstellung 0…1, nicht %`});
    }
    for (const pn of portNames(c)) {
      const used = state.wires.some(w =>
        (w.a.comp===c.id && w.a.port===pn) || (w.b.comp===c.id && w.b.port===pn));
      if (!used) issues.push({err:false, comp:c.id, msg:`${c.name}.${pn} ist unverbunden`});
    }
  }
  // Verbindungsleitungen: Bereichs-/Pflichtprüfung ihrer Parameter
  for (const w of state.wires) {
    if (w.type !== "conduit") continue;
    for (const p of TYPES.conduit.params) {
      if (p.minv == null && p.maxv == null) continue;
      const k = p.keys.find(k => (w.params || {})[k] !== undefined);
      if (k === undefined) continue;
      const si = w.params[k] * (CATALOG.units[p.group] ? CATALOG.units[p.group][k.slice(p.name.length + 1)] : 1);
      if (p.minv != null && si < p.minv)
        issues.push({err:true, msg:`${w.name}: '${p.name}' unter Minimum (${limitLabel(p, p.minv)})`});
      if (p.maxv != null && si > p.maxv)
        issues.push({err:true, msg:`${w.name}: '${p.name}' über Maximum (${limitLabel(p, p.maxv)})`});
    }
  }
  if (!state.comps.length) issues.push({err:false, msg:"Noch keine Komponenten gezeichnet."});
  return issues;
}

function yamlScalar(v) {

function exportYAML() {

    : `fluid: {rho: ${f.rho}, mu: ${f.mu}, cp: ${f.cp}}\n`;

    const parts = [`type: ${c.type}`];

    if (c.ts) parts.push(`ts: ${JSON.stringify(c.ts)}`);

        ["id", "key", "description"].filter(f => e[f])
          .map(f => `${f}: ${JSON.stringify(e[f])}`).join(", ") + "}").join(", ")}]`);
    return `  ${c.name}: {${parts.join(", ")}}\n`;
  };
  for (const c of state.comps) y += compEntry(c);
  for (const w of state.wires) if (w.type === "conduit") y += compEntry(w);
  y += "\nconnections:\n";
  for (const w of state.wires) {
    if (w.type === "conduit") {
      y += `  - [${portRef(w.a)}, ${w.name}.in]\n`;
      y += `  - [${w.name}.out, ${portRef(w.b)}]\n`;
    } else y += `  - [${portRef(w.a)}, ${portRef(w.b)}]\n`;
  }
  y += "\nlayout:\n  components:\n";
  for (const c of state.comps)
    y += `    ${c.name}: {x: ${c.x}, y: ${c.y}${c.rot ? `, rot: ${c.rot}` : ""}}\n`;
  y += "  wires:\n";
  for (const w of state.wires) {
    const pts = w.pts && w.pts.length
      ? `, pts: ${JSON.stringify(w.pts.map(p => [p.x, p.y]))}` : "";
    const nm = w.type === "conduit" ? `name: ${w.name}, ` : "";

/* ---------- YAML Import (Subset-Parser für das Editor-/Beispielformat) ---- */
function splitTop(s, sep) {                       // Kommasplit auf oberster Ebene
  const out = []; let depth = 0, cur = "", q = null;
  for (const ch of s) {
    if (q) { cur += ch; if (ch === q) q = null; continue; }
    if (ch === '"' || ch === "'") { q = ch; cur += ch; continue; }
    if (ch === "{" || ch === "[") depth++;
    if (ch === "}" || ch === "]") depth--;
    if (ch === sep && depth === 0) { out.push(cur); cur = ""; } else cur += ch;
  }
  if (cur.trim()) out.push(cur);
  return out;
}
function parseValue(s) {
  s = s.trim();
  if (s.startsWith("{")) return parseInlineMap(s);
  if (s.startsWith("[")) return splitTop(s.slice(1, -1), ",").map(parseValue);
  if (/^".*"$/.test(s) || /^'.*'$/.test(s)) return s.slice(1, -1);
  if (s === "true") return true;
  if (s === "false") return false;
  if (s !== "" && !isNaN(Number(s))) return Number(s);
  return s;
}
function parseInlineMap(s) {
  s = s.trim();
  if (s.startsWith("{")) s = s.slice(1, -1);
  const obj = {};
  for (const part of splitTop(s, ",")) {
    const i = part.indexOf(":");
    if (i < 0) continue;
    obj[part.slice(0, i).trim()] = parseValue(part.slice(i + 1));
  }
  return obj;
}
function parseInlineList(s) {
  s = s.trim();
  if (s.startsWith("[")) s = s.slice(1, -1);
  return splitTop(s, ",").map(x => String(parseValue(x)));
}
function importYAML(text) {
  const doc = {fluid: null, components: {}, connections: [], layout: {components: {}, wires: []}};
  let section = null, sub = null, buf = null;
  const flush = () => {
    if (!buf) return;
    const i = buf.text.indexOf(":");
    const name = buf.text.slice(0, i).trim();
    const val = buf.text.slice(i + 1).trim();
    if (buf.target === "components") doc.components[name] = parseInlineMap(val);
    else if (buf.target === "layout-components") doc.layout.components[name] = parseInlineMap(val);
    buf = null;
  };
  for (let raw of text.split(/\r?\n/)) {
    const noComment = raw.replace(/(^|\s)#.*$/, "");
    if (!noComment.trim()) continue;
    const indent = noComment.match(/^ */)[0].length;
    const line = noComment.trim();
    if (buf) {                                   // mehrzeilige Inline-Map fortsetzen
      buf.text += " " + line;
      if (splitTop(buf.text.slice(buf.text.indexOf(":") + 1), ",") &&
          (buf.text.match(/{/g) || []).length === (buf.text.match(/}/g) || []).length) flush();
      continue;
    }
    if (indent === 0) {
      const m = line.match(/^(\w+):\s*(.*)$/);
      if (!m) continue;
      section = m[1]; sub = null;
      if (section === "fluid" && m[2]) doc.fluid = parseInlineMap(m[2]);
      continue;
    }
    if (section === "components") {
      buf = {target: "components", text: line};
      if ((line.match(/{/g) || []).length === (line.match(/}/g) || []).length) flush();
    } else if (section === "connections" && line.startsWith("-")) {
      doc.connections.push(parseInlineList(line.replace(/^-\s*/, "")));
    } else if (section === "layout") {
      if (/^components:/.test(line)) { sub = "components"; }
      else if (/^wires:/.test(line)) { sub = "wires"; }
      else if (sub === "components") {
        buf = {target: "layout-components", text: line};
        if ((line.match(/{/g) || []).length === (line.match(/}/g) || []).length) flush();
      } else if (sub === "wires" && line.startsWith("-")) {
        doc.layout.wires.push(parseInlineMap(line.replace(/^-\s*/, "")));
      }
    }

  loadDoc(doc);
}
function loadDoc(doc) {

  idSeq = 1; selection = null; pendingPort = null; lastResult = null;
  if (doc.fluid) {
    if (doc.fluid.preset) state.fluid = {mode:"preset", t_C: doc.fluid.t_C ?? 50,
                                          rho:998, mu:0.001, cp:4180};

    if (!TYPES[type]) { alert(`Unbekannter Typ '${type}' bei '${name}' – übersprungen.`); return; }
    const c = {id: idSeq++, type, name, ts: spec.ts !== undefined ? String(spec.ts) : "",
               x: 120 + (i % grid) * 160, y: 100 + Math.floor(i / grid) * 140, rot: 0, params: {}};
    if (Array.isArray(spec.bems) && spec.bems.length) c.bems = spec.bems;
    for (const [k, v] of Object.entries(spec))
      if (k !== "type" && k !== "ts" && k !== "bems") c.params[k] = v;
    const lay = doc.layout.components[name];

    state.comps.push(c);

    if (w.name) wireMeta["name:" + w.name] = w;
    wireMeta[`${w.a}|${w.b}`] = w;
  }

    wire.color = meta.color || "n";
    if (meta.pts) {

    });
    const a = aRef && parseRef(aRef), b = bRef && parseRef(bRef);
    if (!a || !b) { alert(`Verbindungsleitung '${name}': Endpunkte nicht gefunden – übersprungen.`); continue; }
    const spec = doc.components[name];
    const wire = {type: "conduit", name, ts: spec.ts !== undefined ? String(spec.ts) : "",
                  params: {}, a, b, color: "n"};
    if (Array.isArray(spec.bems) && spec.bems.length) wire.bems = spec.bems;
    for (const [k, v] of Object.entries(spec))
      if (k !== "type" && k !== "ts" && k !== "bems") wire.params[k] = v;

  const issues = validate().filter(i => i.err);
  if (issues.length && !confirm(`Es fehlen Pflichtparameter (${issues.length}). Trotzdem exportieren?`)) return;
  dlgMode = "export";
  document.getElementById("dlg-title").textContent = "YAML (rechenbar mit: hydraulik run <datei>)";
  dlgText.value = exportYAML();
  document.getElementById("dlg-ok").style.display = "none";
  document.getElementById("dlg-save").style.display = "";
  document.getElementById("dlg-file").style.display = "none";
  dlg.showModal();
};
document.getElementById("btn-import").onclick = () => {
  dlgMode = "import";
  document.getElementById("dlg-title").textContent = "YAML einfügen oder Datei laden (Editor-/Beispielformat)";
  dlgText.value = "";
  document.getElementById("dlg-ok").style.display = "";
  document.getElementById("dlg-save").style.display = "none";
  document.getElementById("dlg-file").style.display = "";
  dlg.showModal();
};
document.getElementById("dlg-ok").onclick = () => {
  if (dlgMode === "import") { try { importYAML(dlgText.value); } catch (e) { alert("Import fehlgeschlagen: " + e); } }
  dlg.close();
};
document.getElementById("dlg-close").onclick = () => dlg.close();
document.getElementById("dlg-copy").onclick = () =>
  navigator.clipboard && navigator.clipboard.writeText(dlgText.value);
document.getElementById("dlg-save").onclick = () => {
  const blob = new Blob([dlgText.value], {type: "text/yaml"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "schaltung.yaml";
  a.click();
  URL.revokeObjectURL(a.href);
};
document.getElementById("dlg-file").onclick = () =>
  document.getElementById("dlg-fileinput").click();
document.getElementById("dlg-fileinput").onchange = ev => {
  const f = ev.target.files[0];
  if (!f) return;
  f.text().then(t => { dlgText.value = t; });
  ev.target.value = "";
};
document.getElementById("btn-new").onclick = () => {
  if (confirm("Zeichnung verwerfen?")) { localStorage.removeItem("hydraulik_editor");
    state = {fluid:{mode:"preset",t_C:50,rho:998,mu:0.001,cp:4180}, comps:[], wires:[]};
    idSeq = 1; selection = null; lastResult = null; commit(); render(); }
};

/* ---------- Autosave ------------------------------------------------------- */
function autosave() {
  try { localStorage.setItem("hydraulik_editor", exportYAML()); } catch (e) {}
}
(function restore(){
  try {
    const saved = localStorage.getItem("hydraulik_editor");
    if (saved && saved.includes("components:")) importYAML(saved); else render();
  } catch (e) { render(); }
  if (!history.length) commit();     // History startet immer mit einem Eintrag
})();
</script>
</body>
</html>
