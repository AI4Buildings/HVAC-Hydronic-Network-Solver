# Energetikum (FH Burgenland) – Lüftungsanlage: Vorerhitzer (VE) + Nacherhitzer (NE)
# Hydraulik: je Register eine Einspritzschaltung mit Durchgangsventil im RÜCKLAUF.
# Armaturen laut Planung: Siemens VVG44.25-10 (kvs 10, gleichprozentig),
# STAD DN 40 Voreinstellung 3,5 (Kv = 16,0 lt. TA-Tabelle) primär und sekundär,
# Primärpumpe Δp = 60 kPa konstant, Sekundärpumpen H = 2,75 m (26,65 kPa bei 50 °C).
# Register-UA aus den Datenblatt-Auslegungspunkten kalibriert (ε-NTU, Kreuzstrom):
#   VE H241611A02311XV: 4500 m³/h Luft 13,1→24,0 °C, 16,5 kW, Wasser 2,9 m³/h 52/47 °C, Δp 3,5 kPa
#   NE H241611C02411XV: 4500 m³/h Luft 12,0→25,0 °C, 19,6 kW, Wasser 3,4 m³/h 52/47 °C, Δp 1,9 kPa
# Ventilhübe auf Auslegungsleistung eingestellt. Alle BEMS-IDs sind echte
# Aedifion-Datenpunkte der Anlage (Server VentilationSystem/Energetikum).
# Analyse: python3 examples/09_energetikum_lueftungsregister.py
fluid: {preset: water, t_C: 50}

components:
  erz: {type: ideal_storage, t_set_C: 52, p_out_kPa: 150, description: "Wärmeerzeugung/Verteiler Energetikum, 52 °C Vorlauf"}
  pu_prim: {type: pump, mode: constant_dp, dp_kPa: 60, q_nom_m3h: 6.3, description: "Primärpumpe Verteiler, Δp konstant 60 kPa"}
  ve: {type: heating_coil, ua_ref_W_K: 551, m_dot_air_kg_s: 1.505, t_air_in_C: 13.1, arrangement: crossflow_unmixed, c_Pa_m3h2: 416.2, n: 0.4, q_w_ref_m3h: 2.9, description: "Vorerhitzer H241611A02311XV (RR/WW 1/2), 4500 m³/h Luft; UA_ref am Datenblattpunkt, Teillast n = 0,4"}
  pu_ve: {type: pump, mode: constant_dp, dp_kPa: 26.65, q_nom_m3h: 2.9, description: "Sekundärpumpe VE, H = 2,75 m (26,65 kPa bei ϑm = 50 °C)", bems: [{id: "FHPinkEgk'AS01-2099201_PXC01'A'AGrpL01'PreHcl'Pu'Cmd-BO50", key: "EXP_VENT_VE_PUMP", description: "Betriebsstatus Pumpe (Cmd, 0/1)"}]}
  ab1_ve: {type: tee}
  srv2_ve: {type: balancing_valve, kvs_m3h: 16, description: "STAD DN 40, Voreinstellung 3,5 → Kv = 16,0 (Sekundär)"}
  ab2_ve: {type: tee}
  rv_ve: {type: control_valve, kvs_m3h: 10, opening: 0.6239, characteristic: equal_percentage, description: "Siemens VVG44.25-10 (kvs 10) im Rücklauf VE", bems: [{id: "FHPinkEgk'AS01-2099201_PXC01'A'AGrpL01'PreHcl'Vlv-AO25", key: "EXP_VENT_VE_VENT", description: "Ventilstellung 0–100 %"}]}
  srv1_ve: {type: balancing_valve, kvs_m3h: 16, description: "STAD DN 40, Voreinstellung 3,5 → Kv = 16,0 (Primär)"}
  wmz_ve: {type: energy_meter, q_nom_m3h: 100, description: "WMZ Mtr33 VE-Kreis, Durchflussteil im Primärrücklauf", bems: [{id: "FHPinkEgk'AS03-2099203_PXC03'MtrH'Mtr33'PrVlm-AI28", key: "EXP_VENT_VE_V_dot", description: "Momentan-Volumenstrom [m³/h]"}, {id: "FHPinkEgk'AS03-2099203_PXC03'MtrH'Mtr33'PrPwr-AI27", key: "EXP_VENT_VE_Q_dot", description: "Momentanleistung [kW]"}, {id: "FHPinkEgk'AS03-2099203_PXC03'MtrH'Mtr33'CumEg-AI25", key: "EXP_VENT_VE_Q_cum", description: "Kumulierte Heizenergie [kWh]"}, {id: "FHPinkEgk'AS03-2099203_PXC03'MtrH'Mtr33'TFI-AI29", key: "EXP_VENT_VE_WMZ_T_VL", description: "Vorlauftemperatur WMZ [°C]"}, {id: "FHPinkEgk'AS03-2099203_PXC03'MtrH'Mtr33'TRt-AI30", key: "EXP_VENT_VE_WMZ_T_RL", description: "Rücklauftemperatur WMZ [°C]"}]}
  tf_vl_ve: {type: temperature_sensor, description: "Vorlauffühler VE (Regelung)", bems: [{id: "FHPinkEgk'AS01-2099201_PXC01'A'AGrpL01'PreHcl'TFl-AI214", key: "EXP_VENT_VE_T_VL"}]}
  tf_rl_ve: {type: temperature_sensor, description: "Rücklauffühler VE (Regelung)", bems: [{id: "FHPinkEgk'AS01-2099201_PXC01'A'AGrpL01'PreHcl'TRt-AI215", key: "EXP_VENT_VE_T_RL"}]}
  ne: {type: heating_coil, ua_ref_W_K: 654, m_dot_air_kg_s: 1.499, t_air_in_C: 12, arrangement: crossflow_unmixed, c_Pa_m3h2: 164.4, n: 0.4, q_w_ref_m3h: 3.4, description: "Nacherhitzer H241611C02411XV (RR/WW 2/2), 4500 m³/h Luft; UA_ref am Datenblattpunkt, Teillast n = 0,4"}
  pu_ne: {type: pump, mode: constant_dp, dp_kPa: 26.65, q_nom_m3h: 3.4, description: "Sekundärpumpe NE, H = 2,75 m (26,65 kPa bei ϑm = 50 °C)", bems: [{id: "FHPinkEgk'AS01-2099201_PXC01'A'AGrpL01'ReHcl'Pu'Cmd-BO51", key: "EXP_VENT_NE_PUMP", description: "Betriebsstatus Pumpe (Cmd, 0/1)"}]}
  ab1_ne: {type: tee}
  srv2_ne: {type: balancing_valve, kvs_m3h: 16, description: "STAD DN 40, Voreinstellung 3,5 → Kv = 16,0 (Sekundär)"}
  ab2_ne: {type: tee}
  rv_ne: {type: control_valve, kvs_m3h: 10, opening: 0.6589, characteristic: equal_percentage, description: "Siemens VVG44.25-10 (kvs 10) im Rücklauf NE", bems: [{id: "FHPinkEgk'AS01-2099201_PXC01'A'AGrpL01'ReHcl'Vlv-AO27", key: "EXP_VENT_NE_VENT", description: "Ventilstellung 0–100 %"}]}
  srv1_ne: {type: balancing_valve, kvs_m3h: 16, description: "STAD DN 40, Voreinstellung 3,5 → Kv = 16,0 (Primär)"}
  wmz_ne: {type: energy_meter, q_nom_m3h: 100, description: "WMZ Mtr34 NE-Kreis, Durchflussteil im Primärrücklauf", bems: [{id: "FHPinkEgk'AS03-2099203_PXC03'MtrH'Mtr34'PrVlm-AI34", key: "EXP_VENT_NE_V_dot", description: "Momentan-Volumenstrom [m³/h]"}, {id: "FHPinkEgk'AS03-2099203_PXC03'MtrH'Mtr34'PrPwr-AI33", key: "EXP_VENT_NE_Q_dot", description: "Momentanleistung [kW]"}, {id: "FHPinkEgk'AS03-2099203_PXC03'MtrH'Mtr34'CumEg-AI31", key: "EXP_VENT_NE_Q_cum", description: "Kumulierte Heizenergie [kWh]"}, {id: "FHPinkEgk'AS03-2099203_PXC03'MtrH'Mtr34'TFI-AI35", key: "EXP_VENT_NE_WMZ_T_VL", description: "Vorlauftemperatur WMZ [°C]"}, {id: "FHPinkEgk'AS03-2099203_PXC03'MtrH'Mtr34'TRt-AI36", key: "EXP_VENT_NE_WMZ_T_RL", description: "Rücklauftemperatur WMZ [°C]"}]}
  tf_vl_ne: {type: temperature_sensor, description: "Vorlauffühler NE (Regelung)", bems: [{id: "FHPinkEgk'AS01-2099201_PXC01'A'AGrpL01'ReHcl'TFl-AI216", key: "EXP_VENT_NE_T_VL"}]}
  tf_rl_ne: {type: temperature_sensor, description: "Rücklauffühler NE (Regelung)", bems: [{id: "FHPinkEgk'AS01-2099201_PXC01'A'AGrpL01'ReHcl'TRt-AI217", key: "EXP_VENT_NE_T_RL"}]}
  lt1: {type: conduit}
  lt2: {type: conduit}
  lt3: {type: conduit}
  lt4: {type: conduit}
  lt5: {type: conduit}
  lt6: {type: conduit}
  lt7: {type: conduit}
  lt8: {type: conduit}
  lt9: {type: conduit}
  lt10: {type: conduit}
  lt11: {type: conduit}
  lt12: {type: conduit}
  lt13: {type: conduit}
  lt14: {type: conduit}
  lt15: {type: conduit}
  lt16: {type: conduit}
  lt17: {type: conduit}
  lt18: {type: conduit}
  lt19: {type: conduit}
  lt20: {type: conduit}
  lt21: {type: conduit}

